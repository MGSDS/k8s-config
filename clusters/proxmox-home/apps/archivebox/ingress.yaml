---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: archivebox-tls
  namespace: archivebox
spec:
  secretName: archive.mgsds.com-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: archive.mgsds.com
  dnsNames:
    - archive.mgsds.com
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: archivebox-ingress
  namespace: archivebox
  labels:
    app.kubernetes.io/name: archivebox-ingress
    app.kubernetes.io/component: ingress
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - archive.mgsds.com
      secretName: archive.mgsds.com-tls
  rules:
    - host: archive.mgsds.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: archivebox-archivebox
                port:
                  number: 80

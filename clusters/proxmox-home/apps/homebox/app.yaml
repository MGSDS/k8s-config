---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: homebox-helm
  namespace: homebox
spec:
  interval: 5m
  url: https://bythehugo.github.io/homebox-helm/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homebox
  namespace: homebox
spec:
  chart:
    spec:
      chart: homebox
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: homebox-helm
      version: 0.2.0
  install:
    createNamespace: true
  interval: 1m0s
  releaseName: homebox
  targetNamespace: homebox
  valuesFrom:
    - kind: Secret
      name: homebox-oidc
      valuesKey: client-id
      targetPath: env.HBOX_OIDC_CLIENT_ID
    - kind: Secret
      name: homebox-oidc
      valuesKey: client-secret
      targetPath: env.HBOX_OIDC_CLIENT_SECRET
  values:
    image:
      tag: "main"
    postgresql:
      enabled: false
    persistence:
      storageClass: longhorn
      capacity: 5Gi
    env:
      HBOX_DATABASE_DRIVER: postgres
      HBOX_DATABASE_SSL_MODE: require
      HBOX_OPTIONS_ALLOW_REGISTRATION: false
      HBOX_OIDC_ENABLED: "true"
      HBOX_OIDC_ISSUER_URL: https://pocket-id.mgsds.com
      HBOX_OIDC_AUTO_REDIRECT: "false"
      HBOX_OPTIONS_TRUST_PROXY: "true"
    externalPostgresql:
      host: homebox-db
      port: 5432
      auth:
        username:
          existingSecret: homebox-user.homebox-db.credentials.postgresql.acid.zalan.do
          existingSecretKey: username
        password:
          existingSecret: homebox-user.homebox-db.credentials.postgresql.acid.zalan.do
          existingSecretKey: password
        database: homebox

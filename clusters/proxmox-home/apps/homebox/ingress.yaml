apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: homebox-tls
spec:
  secretName: box.mgsds.com-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: box.mgsds.com
  dnsNames:
    - box.mgsds.com
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: box-ingress-mtls
  labels:
    app.kubernetes.io/name: box-ingress-mtls
    app.kubernetes.io/component: ingress
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - box.mgsds.com
      secretName: box.mgsds.com-tls
  rules:
    - host: box.mgsds.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: homebox
                port:
                  number: 7745

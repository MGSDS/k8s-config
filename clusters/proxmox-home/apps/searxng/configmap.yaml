apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-config
  namespace: searxng
data:
  settings.yml: |
    use_default_settings: true
    server:
      base_url: "https://search.mgsds.com"
      limiter: false
      image_proxy: true
    outgoing:
      proxies:
        http: http://searxng:sxngproxy@singbox.singbox.svc.cluster.local:2080
        https: http://searxng:sxngproxy@singbox.singbox.svc.cluster.local:2080
    ui:
      static_use_hash: true

apiVersion: v1
kind: ConfigMap
metadata:
  name: share-nginx-config
  namespace: share
data:
  default.conf: |
    server {
        listen 80;
        root /usr/share/nginx/html;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;

        location / {
            try_files $uri $uri/ =404;
        }
    }

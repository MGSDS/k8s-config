---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vlogs-ingress
  namespace: victorialogs
  annotations:
    nginx.ingress.kubernetes.io/auth-url: "http://oauth2-proxy.victorialogs.svc.cluster.local/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-signin: "https://vlogs.mgsds.com/oauth2/start?rd=$escaped_request_uri"
  labels:
    app.kubernetes.io/component: ingress
    app.kubernetes.io/name: vlogs-ingress
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - vlogs.mgsds.com
  rules:
    - host: vlogs.mgsds.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vlogs-victoria-logs-single-server
                port:
                  number: 9428
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vlogs-oauth2-proxy-ingress
  namespace: victorialogs
  labels:
    app.kubernetes.io/component: ingress
    app.kubernetes.io/name: vlogs-oauth2-proxy-ingress
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - vlogs.mgsds.com
  rules:
    - host: vlogs.mgsds.com
      http:
        paths:
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: oauth2-proxy
                port:
                  number: 80

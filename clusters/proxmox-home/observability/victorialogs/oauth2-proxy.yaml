---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: oauth2-proxy
  namespace: victorialogs
spec:
  interval: 1h
  url: https://oauth2-proxy.github.io/manifests
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: oauth2-proxy
  namespace: victorialogs
spec:
  interval: 10m
  chart:
    spec:
      chart: oauth2-proxy
      version: "7.15.2"
      sourceRef:
        kind: HelmRepository
        name: oauth2-proxy
        namespace: victorialogs
      interval: 1h
  values:
    config:
      existingSecret: oauth2-proxy-secret
      configFile: |-
        provider = "oidc"
        oidc_issuer_url = "https://pocket-id.mgsds.com"
        email_domains = ["*"]
        upstreams = ["file:///dev/null"]
        cookie_secure = true
        cookie_domains = [".mgsds.com"]
        whitelist_domains = [".mgsds.com"]
        scope = "openid profile email"

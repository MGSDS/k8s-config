---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: oauth2-proxy
  namespace: victorialogs
spec:
  interval: 1h
  url: https://oauth2-proxy.github.io/manifests
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: oauth2-proxy
  namespace: victorialogs
spec:
  interval: 10m
  chart:
    spec:
      chart: oauth2-proxy
      version: "10.4.3"
      sourceRef:
        kind: HelmRepository
        name: oauth2-proxy
        namespace: victorialogs
      interval: 1h
  values:
    config:
      existingSecret: oauth2-proxy-secret
    extraArgs:
      provider: oidc
      oidc-issuer-url: http://pocket-id.pocket-id.svc.cluster.local
      email-domain: "*"
      upstream: "file:///dev/null"
      cookie-secure: "true"
      cookie-domain: ".mgsds.com"
      whitelist-domain: ".mgsds.com"
      scope: "openid profile email"
      skip-provider-button: "true"

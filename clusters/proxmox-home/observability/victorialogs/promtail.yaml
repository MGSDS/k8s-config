---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: grafana
  namespace: victorialogs
spec:
  interval: 1h
  url: https://grafana.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: promtail
  namespace: victorialogs
spec:
  interval: 10m
  chart:
    spec:
      chart: promtail
      version: "6.17.1"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: victorialogs
      interval: 1h
  values:
    tolerations:
      - operator: Exists
    config:
      clients:
        - url: http://vlogs-victoria-logs-single-server.victorialogs.svc.cluster.local:9428/insert/loki/api/v1/push
      snippets:
        extraScrapeConfigs: ""
        pipelineStages:
          - cri: {}
          - decolorize: {}
          - regex:
              expression: '(?i)(?:^|\s|"|\b)(?:level|lvl|severity)[=:]\s*"?(?P<level>trace|debug|dbg|info|inf|notice|warn|warning|wrn|error|err|critical|fatal|panic)"?'
          - regex:
              expression: '(?P<level>TRACE|DEBUG|DBG|INFO|INF|NOTICE|WARN|WARNING|WRN|ERROR|ERR|CRITICAL|FATAL|PANIC)\b'
          - template:
              source: level
              template: '{{ ToLower .Value }}'
          - labels:
              level:
        extraRelabelConfigs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            target_label: service_name
            regex: (.+)
          - source_labels: [__meta_kubernetes_pod_label_cluster_name]
            target_label: service_name
            regex: (.+)
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: service_name
            regex: (.+)

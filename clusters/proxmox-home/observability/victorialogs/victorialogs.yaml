---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: victoriametrics
  namespace: victorialogs
spec:
  interval: 1h
  url: https://victoriametrics.github.io/helm-charts/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vlogs
  namespace: victorialogs
spec:
  interval: 10m
  chart:
    spec:
      chart: victoria-logs-single
      version: 0.12.4
      sourceRef:
        kind: HelmRepository
        name: victoriametrics
        namespace: victorialogs
      interval: 1h
  values:
    server:
      persistentVolume:
        enabled: true
        size: 10Gi
        storageClassName: longhorn
      retentionPeriod: 2

apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: cert-manager
spec:
  interval: 10m
  url: oci://quay.io/jetstack/charts/cert-manager
  layerSelector:
    mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip"
    operation: copy
  ref:
    semver: ">=1.18.1"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
spec:
  interval: 10m
  releaseName: cert-manager
  chartRef:
    kind: OCIRepository
    name: cert-manager
  values:
    crds:
      enabled: true
    prometheus:
      enabled: true
      servicemonitor:
        enabled: true
        labels:
          release: prometheus
        namespace: monitoring
    extraEnv:
      - name: HTTP_PROXY
        valueFrom:
          secretKeyRef:
            name: cert-manager-proxy
            key: proxy-url
      - name: HTTPS_PROXY
        valueFrom:
          secretKeyRef:
            name: cert-manager-proxy
            key: proxy-url
      - name: NO_PROXY
        value: "10.0.0.0/8,192.168.0.0/16,127.0.0.1,localhost,.cluster.local,.svc"
